name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campuscore
          POSTGRES_PASSWORD: campuscore_dev
          POSTGRES_DB: campuscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U campuscore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://campuscore:campuscore_dev@localhost:5432/campuscore
      BETTER_AUTH_SECRET: ci-only-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # CI-only credentials for the bootstrapped accounts (also proves the
      # env-override path used to rotate real passwords in production).
      ADMIN_PASSWORD: CiSmoke!12345
      DEMO_PASSWORD: CiSmoke!12345
      # Empty keys keep AI on the mock provider and payments on the mock channel.
      ANTHROPIC_API_KEY: ""
      AI_PROVIDER: mock
      PAYSTACK_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations (validates them against a fresh Postgres)
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Seed (validates the idempotent seed against the migrated schema)
        run: npm run db:seed

      # `npm run start` is exactly what production runs: migrate deploy +
      # account bootstrap + next start. Booting it and logging in catches
      # anything that builds fine but cannot actually serve — the failure
      # class that shipped broken deploys unnoticed in July 2026.
      - name: Boot the production start command and log in through it
        run: |
          npm run start &
          for i in $(seq 1 45); do
            curl -fsS -o /dev/null http://localhost:3000/login && break
            sleep 2
          done
          curl -fsS -o /dev/null http://localhost:3000/login
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST http://localhost:3000/api/auth/sign-in/email \
            -H 'Content-Type: application/json' -H 'Origin: http://localhost:3000' \
            -d "{\"email\":\"super@demo.campuscore.test\",\"password\":\"$ADMIN_PASSWORD\"}")
          echo "sign-in returned $code"
          test "$code" = "200"
