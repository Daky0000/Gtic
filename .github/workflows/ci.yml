name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: campuscore
          POSTGRES_PASSWORD: campuscore_dev
          POSTGRES_DB: campuscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U campuscore"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://campuscore:campuscore_dev@localhost:5432/campuscore
      BETTER_AUTH_SECRET: ci-only-secret-not-for-production
      BETTER_AUTH_URL: http://localhost:3000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      # Empty keys keep AI on the mock provider and payments on the mock channel.
      ANTHROPIC_API_KEY: ""
      AI_PROVIDER: mock
      PAYSTACK_SECRET_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations (validates them against a fresh Postgres)
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Seed (validates the idempotent seed against the migrated schema)
        run: npm run db:seed
