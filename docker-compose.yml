services:
  db:
    image: postgres:16-alpine
    container_name: campuscore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: campuscore
      POSTGRES_PASSWORD: campuscore_dev
      POSTGRES_DB: campuscore
    ports:
      - "5433:5432"
    volumes:
      - campuscore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U campuscore -d campuscore"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  campuscore_pgdata:
